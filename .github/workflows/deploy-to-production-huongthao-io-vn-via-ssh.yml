name: Deploy to huongthao.io.vn

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"

            cd ~/inet-mvp-demo

            # Sync to latest code. Use fetch + hard reset (not pull) so the deploy
            # target always mirrors origin/main exactly. This discards local drift on
            # tracked files (e.g. previously-committed node_modules that pnpm rewrote
            # locally) which would otherwise abort a merge. Untracked files such as
            # .env, *.db and native build artifacts are left intact.
            git fetch origin main
            git reset --hard origin/main

            # Install root dependencies
            pnpm install --no-frozen-lockfile

            # Install each product's dependencies (rebuilds native modules like better-sqlite3 if updated)
            for dir in products/*/; do
              [ -f "${dir}package.json" ] && (cd "${dir}" && pnpm install --no-frozen-lockfile)
            done

            # One-time cleanup: an earlier deploy ran the ecosystem file as a plain
            # script (wrong extension) and left a junk process named after the file.
            pm2 delete pm2-ecosystem-config-inet-mvp-demo-all-services 2>/dev/null || true

            # Diagnostics — confirm what code is on disk and what PM2 is running.
            echo "=== git HEAD on server ==="
            git log -1 --oneline
            echo "=== DEMO_OVERRIDE still in deployed file? (expect 0) ==="
            grep -c "DEMO_OVERRIDE" products/email-auth-checker/hono-email-auth-checker-api-server.js || echo 0
            echo "=== pm2 list BEFORE ==="
            pm2 list

            # ROOT CAUSE (found 2026-06-19): old product servers were left running as
            # RAW node processes OUTSIDE pm2, holding the product ports. The pm2-managed
            # copies then crash-looped on EADDRINUSE (errored, 60+ restarts) while the
            # stale raw process kept answering with old code — so `pm2 reload`/`start`
            # never took effect. Delete the pm2 entries, free the product ports by
            # killing WHOEVER holds them (kill by PORT, not by process name: the orphan
            # was launched from an older filename, and `pkill -f <name>` also matched
            # this deploy shell and SIGTERM-ed it), then start fresh.
            # Delete pm2 apps by their REAL names (the ecosystem `name:` fields), not the
            # config filename — `pm2 delete <filename>` matches nothing, so the old apps
            # (holding the ports with stale code) survived every prior deploy.
            pm2 delete hub domain-reputation email-auth-checker ssl-health-dashboard ip-reputation-checker 2>/dev/null || true

            # Free the product ports by killing WHOEVER holds them (kill by PORT, not by
            # process name: an orphan launched from an older filename would be missed, and
            # `pkill -f <name>` also matches this deploy shell). Try every tool available.
            for p in 9041 9042 9043 9044; do
              command -v fuser >/dev/null 2>&1 && fuser -k "${p}/tcp" 2>/dev/null || true
              command -v lsof  >/dev/null 2>&1 && kill -9 $(lsof -ti "tcp:${p}" 2>/dev/null) 2>/dev/null || true
              command -v ss    >/dev/null 2>&1 && kill -9 $(ss -ltnpH "sport = :${p}" 2>/dev/null | grep -oP 'pid=\K[0-9]+') 2>/dev/null || true
            done
            sleep 2
            pm2 start pm2-ecosystem-inet-mvp-demo-all-services.config.cjs --update-env
            pm2 save

            echo "=== pm2 list AFTER ==="
            pm2 list

            # Ground-truth verification: confirm port 9043 is served by the NEW code.
            # The enriched build returns a `keyType` field that old code never had.
            sleep 3
            echo "=== port 9043 owner ==="
            (command -v lsof >/dev/null 2>&1 && lsof -i:9043 -sTCP:LISTEN -P -n) || (command -v ss >/dev/null 2>&1 && ss -ltnp "sport = :9043") || echo "no lsof/ss"
            echo "=== ssl-health real-data check (expect keyType present) ==="
            curl -s --max-time 15 -X POST http://localhost:9043/api/check -H "Content-Type: application/json" -d '{"domains":["inet.vn"]}' | grep -o '"keyType"' && echo "OK: new code serving" || (echo "FAIL: old code still answering"; pm2 logs ssl-health-dashboard --lines 25 --nostream 2>&1 || true)
