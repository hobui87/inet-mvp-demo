name: Deploy to huongthao.io.vn

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"

            cd ~/inet-mvp-demo

            # Sync to latest code. Use fetch + hard reset (not pull) so the deploy
            # target always mirrors origin/main exactly. This discards local drift on
            # tracked files (e.g. previously-committed node_modules that pnpm rewrote
            # locally) which would otherwise abort a merge. Untracked files such as
            # .env, *.db and native build artifacts are left intact.
            git fetch origin main
            git reset --hard origin/main

            # Install root dependencies
            pnpm install --no-frozen-lockfile

            # Install each product's dependencies (rebuilds native modules like better-sqlite3 if updated)
            for dir in products/*/; do
              [ -f "${dir}package.json" ] && (cd "${dir}" && pnpm install --no-frozen-lockfile)
            done

            # One-time cleanup: an earlier deploy ran the ecosystem file as a plain
            # script (wrong extension) and left a junk process named after the file.
            pm2 delete pm2-ecosystem-config-inet-mvp-demo-all-services 2>/dev/null || true

            # Diagnostics — confirm what code is on disk and what PM2 is running.
            echo "=== git HEAD on server ==="
            git log -1 --oneline
            echo "=== DEMO_OVERRIDE still in deployed file? (expect 0) ==="
            grep -c "DEMO_OVERRIDE" products/email-auth-checker/hono-email-auth-checker-api-server.js || echo 0
            echo "=== pm2 list BEFORE ==="
            pm2 list

            # `pm2 reload` was observed to keep serving STALE code (false-success):
            # it gracefully reloaded the named processes but they continued running the
            # previous build, so removed demo-override code stayed live. Delete the
            # ecosystem's apps then start fresh to GUARANTEE the new build is loaded.
            # Brief restart downtime is acceptable for this demo server; reliability
            # matters more than zero-downtime here.
            pm2 delete pm2-ecosystem-inet-mvp-demo-all-services.config.cjs 2>/dev/null || true
            pm2 start pm2-ecosystem-inet-mvp-demo-all-services.config.cjs --update-env
            pm2 save

            echo "=== pm2 list AFTER ==="
            pm2 list
