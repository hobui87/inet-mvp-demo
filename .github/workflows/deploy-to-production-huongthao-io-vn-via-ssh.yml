name: Deploy to huongthao.io.vn

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"

            cd ~/inet-mvp-demo

            # Sync to latest code. Use fetch + hard reset (not pull) so the deploy
            # target always mirrors origin/main exactly. This discards local drift on
            # tracked files (e.g. previously-committed node_modules that pnpm rewrote
            # locally) which would otherwise abort a merge. Untracked files such as
            # .env, *.db and native build artifacts are left intact.
            git fetch origin main
            git reset --hard origin/main

            # Install root dependencies
            pnpm install --no-frozen-lockfile

            # Install each product's dependencies (rebuilds native modules like better-sqlite3 if updated)
            for dir in products/*/; do
              [ -f "${dir}package.json" ] && (cd "${dir}" && pnpm install --no-frozen-lockfile)
            done

            # One-time cleanup: an earlier deploy ran the ecosystem file as a plain
            # script (wrong extension) and left a junk process named after the file.
            pm2 delete pm2-ecosystem-config-inet-mvp-demo-all-services 2>/dev/null || true

            # Zero-downtime reload if processes are already running, otherwise start
            # them. The ecosystem file ends in .config.cjs so PM2 parses its `apps`
            # array (reload matches existing processes by name; start boots a fresh
            # server). `pm2 startOrReload` is avoided — it expects a JSON dump.
            pm2 reload pm2-ecosystem-inet-mvp-demo-all-services.config.cjs --update-env \
              || pm2 start pm2-ecosystem-inet-mvp-demo-all-services.config.cjs --update-env
            pm2 save
