packages:
  - "dashboard"
  - "products/*"

# Native deps allowed to run install/build scripts. Required by pnpm 10+/11,
# which block build scripts by default (pnpm 11 makes this a hard error).
# This is the canonical location — pnpm 11 no longer reads the "pnpm" field in package.json.
onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
  - sharp
